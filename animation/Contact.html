<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us — Bumanda Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Playwrite+ID:wght@100..400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
    />
    <style>
      :root {
        --ivory: #f7f3ec;
        --paper: #fffdf9;
        --ink: #201d1a;
        --clay: #a6613d;
        --sage: #7c8467;
        --hairline: #dcd4c7;
        --muted: #4a453f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background-color: var(--ivory);
        color: var(--ink);
        font-family: "Lobster Two", sans-serif;
        font-style: italic;
      }

      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 80px 24px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 64px;
      }
      .basic {
        animation: basic 1s linear backwards;
}
@keyframes basic {
  0% {
    transform: translateX(100px);
    opacity: 0;
  }
  100% {
    transform: translateX(0);
    opacity: 0.9;
  }
}

      @media (max-width: 768px) {
        .wrap {
          grid-template-columns: 1fr;
          padding: 56px 20px;
          gap: 48px;
        }
      }

      .intro {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .eyebrow {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--clay);
        margin-bottom: 24px;
      }

      h1 {
        font-family: "Playfair Display", Georgia, serif;
        font-size: clamp(2.5rem, 5vw, 3.5rem);
        line-height: 1.05;
        margin: 0 0 32px;
      }

      .intro p.desc {
        font-size: 1rem;
        line-height: 1.7;
        color: var(--muted);
        max-width: 380px;
      }

      .contact-details {
        margin-top: 64px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .contact-details .row {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 14px;
      }

      .contact-details svg {
        flex-shrink: 0;
        color: var(--sage);
      }

      .form-col {
        position: relative;
      }

      .tag {
        position: absolute;
        top: -14px;
        left: 32px;
        background-color: var(--ink);
        color: var(--ivory);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        padding: 6px 16px;
        z-index: 2;
      }

      .card {
        border: 1.5px solid var(--hairline);
        background-color: var(--paper);
        padding: 48px 40px 40px;
        position: relative;
      }

      .field {
        margin-bottom: 24px;
      }

      .field label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--sage);
        margin-bottom: 8px;
      }

      .field input,
      .field textarea {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 1.5px solid var(--hairline);
        padding: 8px 0;
        font-size: 16px;
        font-family: inherit;
        color: var(--ink);
        outline: none;
        transition: border-color 0.2s ease;
        resize: none;
      }

      .field input::placeholder,
      .field textarea::placeholder {
        color: #b8b0a3;
      }

      .field input:focus,
      .field textarea:focus {
        border-bottom-color: var(--ink);
      }

      .submit-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 16px;
        margin-top: 12px;
        background-color: var(--ink);
        color: var(--ivory);
        border: none;
        font-family: inherit;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        cursor: pointer;
        transition: opacity 0.2s ease;
      }

      .submit-btn:hover {
        opacity: 0.9;
      }

      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .confirmation {
        text-align: center;
        padding: 64px 0;
        display: none;
      }

      .confirmation.show {
        display: block;
      }

      .confirmation h2 {
        font-family: "Playfair Display", Georgia, serif;
        font-size: 1.75rem;
        margin: 0 0 8px;
      }

      .confirmation p {
        color: var(--muted);
        font-size: 14px;
        margin: 0;
      }

      .form-inner.hide {
        display: none;
      }

      .error-text {
        color: var(--clay);
        font-size: 12px;
        margin-top: 6px;
        min-height: 16px;
      }
      .row{
         color:  #4a453f;
      }
      .row a{
        text-decoration: none;
        color:  #4a453f;
      }
       .info-details a{
        text-decoration: none;
        color:  #4a453f;
      }
      .info-item{
        color:  #4a453f;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="intro basic">
        <div>
          <p class="eyebrow">Bumanda Store</p>
          <h1>Let's talk.</h1>
          <p class="desc">
            Questions about an order, a fit, or a collaboration? Send us a note
            — a real person reads every one.
          </p>
        </div>

        <div class="contact-details">
          <div class="row">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M4 4h16v16H4z" />
              <path d="m22 6-10 7L2 6" />
            </svg>
            <span class="info-item"><a href="mailto:info@example.com">info@example.com</a></span>
          </div>
          <div class="row">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
              <circle cx="12" cy="10" r="3" />
            </svg>
            <span>Lagos, Nigeria</span>
          </div>
                <div class="info-item">📍 123 Street, City</div>
                <div class="info-details">📞 <a href="tel:+2347065607094">+2347065607094</a></div>
                <div class="info-details">📞 <a href="tel:+2349011924884">+2349011924884</a></div>
          <div class="row">
            <a
              href="https://www.instagram.com/"
              target="_blank"
              style="color: #4a453f; font-size: 20px; text-decoration: none"
              ><i class="ph ph-instagram-logo"></i
            ></a>
            <a
              href="https://twitter.com/"
              target="_blank"
              style="color: #4a453f; font-size: 20px; text-decoration: none"
              ><i class="ph ph-twitter-logo"></i
            ></a>
            <a
              href="https://www.facebook.com/"
              target="_blank"
              style="color: #4a453f; font-size: 20px; text-decoration: none"
              ><i class="ph ph-facebook-logo"></i
            ></a>
            <a
              href="https://www.tiktok.com/"
              target="_blank"
              style="color: #4a453f; font-size: 20px; text-decoration: none"
              ><i class="ph ph-tiktok-logo"></i
            ></a>
          </div>
        </div>
      </div>

      <div class="form-col">
        <div class="tag">Get in touch</div>
        <div class="card">
          <form id="contactForm" class="form-inner">
            <div class="field">
              <label for="name">Name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Your full name"
                required
              />
            </div>

            <div class="field">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
              />
              <div class="error-text" id="emailError"></div>
            </div>

            <div class="field">
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                rows="5"
                placeholder="How can we help?"
                required
              ></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
              Send message
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="m22 2-7 20-4-9-9-4Z" />
                <path d="M22 2 11 13" />
              </svg>
            </button>
          </form>

          <div class="confirmation" id="confirmation">
            <h2>Message sent.</h2>
            <p>We'll be in touch within one business day.</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("contactForm");
      const submitBtn = document.getElementById("submitBtn");
      const confirmation = document.getElementById("confirmation");
      const emailInput = document.getElementById("email");
      const emailError = document.getElementById("emailError");

      function isValidEmail(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        if (!isValidEmail(emailInput.value)) {
          emailError.textContent = "Please enter a valid email address.";
          emailInput.focus();
          return;
        }
        emailError.textContent = "";

        const data = {
          name: document.getElementById("name").value,
          email: emailInput.value,
          message: document.getElementById("message").value,
        };

        submitBtn.disabled = true;
        submitBtn.textContent = "Sending...";

        // Replace this block with your real submission logic:
        // e.g. fetch('/api/contact', { method: 'POST', body: JSON.stringify(data) })
        sendMessage(data)
          .then(() => {
            form.classList.add("hide");
            confirmation.classList.add("show");
          })
          .catch(() => {
            submitBtn.disabled = false;
            submitBtn.textContent = "Send message";
            emailError.textContent = "Something went wrong. Please try again.";
          });
      });

      // Stubbed submit function — swap for a real fetch() call to your backend or a service like Formspree/EmailJS
      function sendMessage(data) {
        return new Promise((resolve) => {
          console.log("Contact form submitted:", data);
          setTimeout(resolve, 600);
        });
      }
    </script>
  </body>
</html>
